<!DOCTYPE html>
<html>
  <head>
    <style>
      body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #fff; overflow: hidden; }
      .container { display: flex; flex-direction: column; gap: 12px; }
      label { font-size: 11px; color: #5f6368; font-weight: bold; letter-spacing: 0.5px; }
      input { width: 100%; padding: 10px; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; outline: none; }
      input:focus { border: 2px solid #1a73e8; padding: 9px; }
      button { 
        margin-top: 5px; width: 100%; padding: 12px; 
        background: #1a73e8; color: white; border: none; 
        border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px;
      }
      button:hover { background: #1765cc; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3); }
      #loader { display: none; text-align: center; color: #1a73e8; font-size: 13px; margin-top: 15px; font-weight: 500; }
    </style>
  </head>
  <body>
    <div class="container">
      <div>
        <label>START DATE</label>
        <input type="date" id="start">
      </div>
      <div>
        <label>END DATE</label>
        <input type="date" id="end">
      </div>
      <button onclick="execute()">TRANSFER DATA</button>
      <div id="loader">⚙️ Fetching Jaipur Records...</div>
    </div>

    <script>
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('start').value = today;
      document.getElementById('end').value = today;

      function execute() {
        const btn = document.querySelector('button');
        const loader = document.getElementById('loader');
        
        btn.disabled = true;
        btn.style.background = "#dadce0";
        loader.style.display = "block";

        google.script.run
          .withSuccessHandler(msg => {
            alert(msg);
            google.script.host.close();
          })
          .withFailureHandler(err => {
            alert(err.message);
            btn.disabled = false;
            btn.style.background = "#1a73e8";
            loader.style.display = "none";
          })
          .processJaipurTransfer({
            start: document.getElementById('start').value, 
            end: document.getElementById('end').value
          });
      }
    </script>
  </body>
</html>
