<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Main Screen -->
<div id="mainScreen">
  <div class="header">
    <h3>Delivery Status Updater</h3>
    <button id="settingsBtn" class="settings-btn" title="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </div>

  <div class="sheet-section">
    <label>Sheet IDs</label>
    <div id="sheetIdsContainer">
      <!-- input rows added dynamically -->
    </div>
    <button id="addSheetBtn" class="btn-icon add-btn" title="Add another Sheet ID">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      Add Sheet
    </button>
  </div>

  <div class="action-buttons">
    <button id="startBtn" class="btn-primary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: middle;"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
      Start
    </button>
    <button id="stopBtn" class="btn-danger">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: middle;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
      Stop
    </button>
  </div>

  <div class="status-container">
    <span class="status-label">Status</span>
    <span id="status" class="status-badge status-stopped">Stopped</span>
  </div>

  <div class="logs-header">
    <h4>Logs</h4>
    <button id="clearLogsBtn" class="btn-icon-small" title="Clear Logs">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
    </button>
  </div>
  <div id="logs"></div>
</div>

<!-- Settings Screen -->
<div id="settingsScreen" style="display:none;">
  <div class="header">
    <button id="backBtn" class="settings-btn" title="Back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </button>
    <h3>Settings</h3>
    <div style="width: 36px;"></div> <!-- Spacer for perfect centering -->
  </div>

  <div class="settings-panel">
    <div class="sites-row">
      <label for="siteList">Include Sites</label>
      <p class="help-text">Enter one site per line (e.g. Amazon.in)</p>
      <textarea id="siteList" rows="6" placeholder="Enter one site per line..."></textarea>
      <div class="save-row">
        <button id="saveSitesBtn" class="btn-primary btn-full">Save Changes</button>
        <span id="saveStatus" class="save-status"></span>
      </div>
    </div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
